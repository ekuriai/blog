name: validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Validate PR changes
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;

            // 1. Check that only posts/*.md files are changed
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr_number }
            );

            const invalidFiles = files.filter(
              f => !f.filename.match(/^posts\/[a-z0-9-]+\.md$/)
            );

            if (invalidFiles.length > 0) {
              const names = invalidFiles.map(f => f.filename).join(', ');
              core.setFailed(
                `PR contains files outside posts/*.md: ${names}\n` +
                `Only markdown files in posts/ with lowercase alphanumeric slugs are allowed.`
              );
              return;
            }

            if (files.length === 0) {
              core.setFailed('PR has no file changes.');
              return;
            }

            // 2. Validate frontmatter of each added/modified post
            const fs = require('fs');
            const REQUIRED_FIELDS = ['title', 'description', 'date', 'category'];
            const VALID_CATEGORIES = ['guide', 'dev-diary', 'firfir'];
            const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
            const FILENAME_RE = /^(\d{4}-\d{2}-\d{2})-[a-z0-9-]+\.md$/;

            for (const file of files) {
              if (file.status === 'removed') continue;

              const basename = file.filename.split('/').pop();

              // Validate filename format: YYYY-MM-DD-slug.md
              if (!FILENAME_RE.test(basename)) {
                core.setFailed(
                  `${file.filename}: filename must match YYYY-MM-DD-slug.md format`
                );
                return;
              }

              const content = fs.readFileSync(file.filename, 'utf8');

              // Parse frontmatter (simple parser — no external deps)
              const fmMatch = content.match(/^---\n([\s\S]*?)\n---/);
              if (!fmMatch) {
                core.setFailed(
                  `${file.filename}: missing YAML frontmatter (---)`
                );
                return;
              }

              const frontmatter = {};
              for (const line of fmMatch[1].split('\n')) {
                const colonIdx = line.indexOf(':');
                if (colonIdx === -1) continue;
                const key = line.slice(0, colonIdx).trim();
                let value = line.slice(colonIdx + 1).trim();
                // Strip surrounding quotes
                if ((value.startsWith('"') && value.endsWith('"')) ||
                    (value.startsWith("'") && value.endsWith("'"))) {
                  value = value.slice(1, -1);
                }
                frontmatter[key] = value;
              }

              // Check required fields
              for (const field of REQUIRED_FIELDS) {
                if (!frontmatter[field]) {
                  core.setFailed(
                    `${file.filename}: missing required frontmatter field "${field}"`
                  );
                  return;
                }
              }

              // Validate date format
              if (!DATE_RE.test(frontmatter.date)) {
                core.setFailed(
                  `${file.filename}: date must be YYYY-MM-DD format, got "${frontmatter.date}"`
                );
                return;
              }

              // Validate category
              if (!VALID_CATEGORIES.includes(frontmatter.category)) {
                core.setFailed(
                  `${file.filename}: category must be one of [${VALID_CATEGORIES.join(', ')}], got "${frontmatter.category}"`
                );
                return;
              }

              // Validate post body exists
              const body = content.replace(/^---\n[\s\S]*?\n---\n?/, '').trim();
              if (body.length < 50) {
                core.setFailed(
                  `${file.filename}: post body is too short (${body.length} chars, minimum 50)`
                );
                return;
              }

              core.info(`✓ ${file.filename} — valid`);
            }

            core.info(`All ${files.length} file(s) passed validation.`);
